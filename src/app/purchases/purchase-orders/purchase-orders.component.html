<section class="px-16 py-10">
  <div class="flex items-center justify-between py-4">
    <h1 class="text-2xl font-semibold">Órdenes de Compra</h1>
    <p-button label="Nueva orden" severity="info" (onClick)="createPurchaseOrder()"/>
  </div>
  <p-table 
    #ordersDataTable
    [value]="purchaseOrders()" 
    [loading]="loading()" 
    [paginator]="true" 
    [rows]="20" 
    [rowsPerPageOptions]="[10, 15, 20, 25, 50]"
    [globalFilterFields]="['name', 'sku', 'barcode']"
    dataKey="id"
    styleClass="p-datatable-striped p-datatable-sm p-datatable-gridless rounded-md">
    <ng-template pTemplate="header">
      <tr class="h-16">
        <th class="w-[300px]" pSortableColumn="invoiceNumber">No. Orden <p-sortIcon class="ml-2" field="invoiceNumber"/></th>
        <th class="w-[150px]" pSortableColumn="date">Fecha <p-sortIcon class="ml-2" field="date"/></th>
        <th class="w-[400px]">Estado</th>
        <th class="w-[300px]">Proveedor</th>
        <th class="w-[250px]">Monto Total</th>
        <th class="w-[250px]">Monto Pendiente</th>
        <th class="w-[120px]">Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-order>
      <tr [pSelectableRow]="order" [pSelectableRowIndex]="order.id">
        <td>{{ order.invoiceNumber }}</td>
        <td>{{ order.date | date: 'dd/MM/yyyy' }}</td>
        <td>{{ order.status | purchaseStatus}}</td>
        <td>{{ order.supplier.name }}</td>
        <td>{{ order.total | currency: 'Q ' }}</td>
        <td>{{ order.pendingAmount | currency: 'Q ' }}</td>
        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-pencil" severity="warn" />
            <p-button 
              icon="pi pi-trash" 
              severity="danger"
            />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</section>

<section class="px-16 py-10">
  <div class="flex justify-between">
    <h1 class="text-2xl font-semibold mb-8">Proveedores</h1>
    <p-button label="Crear proveedor" severity="success" (onClick)="createSupplier()"/>
  </div>
  <p-table 
    #suppliersDataTable
    [value]="suppliers()" 
    [loading]="loading()" 
    [paginator]="true" 
    [rows]="20" 
    [rowsPerPageOptions]="[10, 15, 20, 25, 50]"
    [globalFilterFields]="['name', 'sku', 'barcode']"
    dataKey="id"
    styleClass="p-datatable-striped p-datatable-sm p-datatable-gridless rounded-md">
    <ng-template pTemplate="header">
      <tr class="h-16">
        <th class="w-[400px]" pSortableColumn="name">Proveedor <p-sortIcon class="ml-2" field="name"/></th>
        <th class="w-[200px]">NIT</th>
        <th class="w-[300px]" pSortableColumn="branch.name">Contacto <p-sortIcon class="ml-2" field="branch.name"/></th>
        <th class="w-[250px]">Correo</th>
        <th class="w-[350px]">Dirección</th>
        <th class="w-[350px]">Cuenta bancaria</th>
        <th class="w-[120px]">Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-supplier>
      <tr class="h-16">
        <td>
          <div class="font-semibold">
            {{ supplier.name }}
          </div>
        </td>
        <td>{{ supplier.nit }}</td>
        <td>
          <div class="flex flex-col font-semibold">
            <small class="text-xs font-medium">{{ supplier.contactName }}</small>
            {{ supplier.phone }}
          </div>
        </td>
        <td>{{ supplier.email }}</td>
        <td>{{ supplier.address }}</td>
        <td>{{ supplier.accountNumber }}</td>
        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-pencil" severity="warn" (onClick)="editSupplier(supplier.id)" />
            <p-button icon="pi pi-trash" severity="danger" (onClick)="deleteSupplier(supplier)" />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</section>

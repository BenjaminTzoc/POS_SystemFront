<section class="px-16 py-10">
  <div class="flex justify-between">
    <h1 class="text-2xl font-semibold mb-8">Productos</h1>
    <p-button label="Nuevo Producto" severity="success" (onClick)="goToNewProduct()"/>
  </div>
  <p-table 
    #productsDataTable
    [value]="filteredProducts" 
    [loading]="loading" 
    [paginator]="true" 
    [rows]="20" 
    [rowsPerPageOptions]="[10, 15, 20, 25, 50]"
    [globalFilterFields]="['name', 'sku', 'barcode']"
    dataKey="id"
    styleClass="p-datatable-striped p-datatable-sm p-datatable-gridless rounded-md">
    <ng-template pTemplate="caption">
      <div class="flex justify-between p-4">
        <p-iconfield iconPosition="left">
          <p-inputicon>
            <i class="pi pi-search"></i>
          </p-inputicon>
          <input pInputText type="text" (input)="productsDataTable.filterGlobal($event.target.value, 'contains')" class="w-80" placeholder="Buscar producto" />
        </p-iconfield>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
        <tr class="h-16">
          <th class="w-[120px]">Imagen</th>
          <th class="w-[300px]" pSortableColumn="name">Producto <p-sortIcon class="ml-2" field="name"/></th>
          <th pSortableColumn="price">Precio de venta <p-sortIcon class="ml-2" field="price"/></th>
          <th pSortableColumn="barcode">Código Barras <p-sortIcon class="ml-2" field="barcode" /></th>
          <th>Stock total actual</th>
          <th class="w-[120px]">Acciones</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-product>
      <tr [pSelectableRow]="product" [pSelectableRowIndex]="product.id">
        <td>
          <div class="w-14 aspect-square rounded-md border border-gray-200">
            <img [src]="getProductImageUrl(product.imageUrl)" [alt]="product.name" class="w-full h-full object-scale-down">
          </div>
        </td>
        <td class="font-semibold">
          <div class="flex flex-col">
            <small class="text-xs font-medium">{{ product.sku }} - {{ product.category.name }}</small>
            {{ product.name }}
          </div>
        </td>
        <td>{{ product.price | currency: 'Q' }}</td>
        <td>{{ product.barcode }}</td>
        <td>{{ product.stock }} {{ product.unit.abbreviation }}</td>
        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-pencil" severity="warn" />
            <p-button 
              icon="pi pi-trash" 
              severity="danger" 
              (onClick)="onDeleteProduct(product)"
            />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</section>

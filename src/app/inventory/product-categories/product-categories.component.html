<section class="px-16 py-10">
  <div class="flex justify-between">
    <h1 class="text-2xl font-semibold mb-8">Categorías de productos</h1>
    <p-button label="Nueva Categoría" severity="success" (onClick)="goToNewCategory()"/>
  </div>
  <p-table 
    #categoriesDataTable
    [value]="categories" 
    [loading]="loading()" 
    [paginator]="true" 
    [rows]="20" 
    [rowsPerPageOptions]="[10, 15, 20, 25, 50]"
    [globalFilterFields]="['name', 'id', 'defaultUnit.abbreviation']"
    dataKey="id"
    styleClass="p-datatable-striped p-datatable-sm p-datatable-gridless rounded-md">
    <ng-template pTemplate="caption">
      <div class="flex justify-between p-4">
        <p-iconfield iconPosition="left">
          <p-inputicon>
            <i class="pi pi-search"></i>
          </p-inputicon>
          <input pInputText type="text" (input)="categoriesDataTable.filterGlobal($event.target.value, 'contains')" class="w-80" placeholder="Buscar categoría" />
        </p-iconfield>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
        <tr class="h-16">
          <th class="w-[250px]">ID</th>
          <th class="w-[150px]" pSortableColumn="name">Categoría <p-sortIcon class="ml-2" field="name"/></th>
          <th class="w-[200px]" pSortableColumn="createdAt">Fecha creación <p-sortIcon class="ml-2" field="createdAt" /></th>
          <th class="w-[500px]">Descripción</th>
          <th class="w-[200px]">Unidad de medida</th>
          <th class="w-[120px]">Acciones</th>
        </tr>
    </ng-template>
      <ng-template pTemplate="body" let-category>
        <tr [pSelectableRow]="category" [pSelectableRowIndex]="category.id">
          <td>{{ category.id }}</td>
          <td>{{ category.name }}</td>
          <td>{{ category.createdAt | date: 'dd/mm/yy' }}</td>
          <td>{{ category.description }}</td>
          <td>{{ category.defaultUnit?.abbreviation || 'No definido' }}</td>
          <td>
            <div class="flex gap-2">
              <p-button 
                icon="pi pi-pencil" 
                severity="warn" 
                (onClick)="onEditCategory(category.id)"
              />
              <p-button 
                icon="pi pi-trash" 
                severity="danger" 
                (onClick)="onDeleteCategory(category)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
  </p-table>
</section>

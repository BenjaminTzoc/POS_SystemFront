<div class="p-6 bg-gray-50/30 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-2xl">
    <!-- Breadcrumb/Back Button -->
    <div class="flex items-center gap-4 mb-8">
      <button
        pButton
        icon="pi pi-arrow-left"
        class="p-button-rounded p-button-text !text-gray-400 hover:!text-indigo-600 hover:!bg-white !shadow-sm !transition-all"
        (click)="onCancelProccess()"
      ></button>
      <div>
        <h1 class="text-3xl font-bold text-gray-800 tracking-tight">
          {{ isEditMode ? 'Editar' : 'Nueva' }} Categoría
        </h1>
        <p class="text-gray-500 text-sm">Organiza tus productos con una categoría clara.</p>
      </div>
    </div>

    <!-- Main Form Card -->
    <div
      class="bg-white rounded-[2rem] shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden text-left"
    >
      <div class="p-8 md:p-10">
        <form [formGroup]="categoryForm" (ngSubmit)="onSaveCategory()" class="space-y-8">
          <!-- Name Field -->
          <div class="relative group">
            <label
              for="name"
              class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 px-1"
            >
              Nombre de la Categoría
            </label>
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-500 transition-colors"
              >
                <i class="pi pi-folder-open"></i>
              </span>
              <input
                pInputText
                id="name"
                formControlName="name"
                placeholder="Ej: Lácteos, Bebidas, Electrónica..."
                class="w-full !pl-12 !py-4 !rounded-2xl !bg-gray-50 !border-transparent focus:!bg-white focus:!border-indigo-200 focus:!ring-4 focus:!ring-indigo-100/50 !transition-all font-semibold"
                [ngClass]="{
                  '!border-rose-300 !ring-rose-100':
                    categoryForm.get('name')?.invalid && categoryForm.get('name')?.touched,
                }"
              />
            </div>
            <div class="mt-2 px-1 flex justify-between">
              <p class="text-[10px] text-gray-400 font-medium tracking-tight">
                Nombre identificador del grupo
              </p>
              <p
                *ngIf="categoryForm.get('name')?.invalid && categoryForm.get('name')?.touched"
                class="text-[10px] text-rose-500 font-bold uppercase transition-all animate-pulse"
              >
                El nombre es obligatorio
              </p>
            </div>
          </div>

          <!-- Default Unit Selection -->
          <div class="group">
            <label
              for="defaultUnitId"
              class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 px-1"
            >
              Unidad de Medida sugerida
            </label>
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 pl-4 z-10 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-500 transition-colors"
              >
                <i class="pi pi-box"></i>
              </span>
              <p-select
                [options]="units"
                [checkmark]="true"
                [showClear]="true"
                formControlName="defaultUnitId"
                optionLabel="name"
                optionValue="id"
                placeholder="Seleccionar unidad (ej: Unidad, Kg...)"
                class="modern-select w-full"
                appendTo="body"
              />
            </div>
            <p class="mt-2 px-1 text-[10px] text-gray-400 font-medium">
              Unidad principal para los productos de esta categoría
            </p>
          </div>

          <!-- Description Field -->
          <div class="group">
            <label
              for="description"
              class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 px-1"
            >
              Descripción Opcional
            </label>
            <textarea
              pTextarea
              id="description"
              formControlName="description"
              placeholder="Detalla qué tipos de productos pertenecen aquí..."
              rows="3"
              class="w-full !p-4 !rounded-2xl !bg-gray-50 !border-transparent focus:!bg-white focus:!border-indigo-200 focus:!ring-4 focus:!ring-indigo-100/50 !transition-all resize-none"
            ></textarea>
          </div>

          <!-- Action Buttons -->
          <div class="flex items-center justify-end gap-4 pt-4">
            <button
              pButton
              type="button"
              label="Descartar"
              class="p-button-text !text-gray-400 hover:!text-gray-600 !rounded-2xl !px-6"
              (click)="onCancelProccess()"
            ></button>
            <button
              pButton
              type="submit"
              [label]="isEditMode ? 'Actualizar Categoría' : 'Crear Categoría'"
              [icon]="'pi pi-check'"
              [disabled]="categoryForm.invalid"
              class="p-button-raised p-button-primary !rounded-2xl !px-8 !py-4 shadow-xl hover:shadow-indigo-200 transition-all font-bold tracking-tight"
            ></button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

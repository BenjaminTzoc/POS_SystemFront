<div class="p-6 bg-gray-50/30 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-2xl">
    <!-- Breadcrumb/Back Button -->
    <div class="flex items-center gap-4 mb-8">
      <button
        pButton
        icon="pi pi-arrow-left"
        class="p-button-rounded p-button-text !text-gray-400 hover:!text-indigo-600 hover:!bg-white !shadow-sm !transition-all"
        (click)="onCancel()"
      ></button>
      <div>
        <h1 class="text-3xl font-bold text-gray-800 tracking-tight">
          {{ isEdit ? 'Editar' : 'Nueva' }} Sucursal
        </h1>
        <p class="text-gray-500 text-sm">Gestiona la información base y contacto de la sede.</p>
      </div>
    </div>

    <!-- Main Form Card -->
    <div
      class="bg-white rounded-[2rem] shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden text-left"
    >
      <div class="p-8 md:p-10">
        <form [formGroup]="branchForm" (ngSubmit)="onSubmit()" class="space-y-8">
          <!-- Name Field -->
          <div class="relative group">
            <label
              for="name"
              class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 px-1"
            >
              Nombre de la Sucursal
            </label>
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-500 transition-colors"
              >
                <i class="pi pi-map-marker"></i>
              </span>
              <input
                pInputText
                id="name"
                formControlName="name"
                placeholder="Ej: Sucursal Central, Bodega Norte..."
                class="w-full !pl-12 !py-4 !rounded-2xl !bg-gray-50 !border-transparent focus:!bg-white focus:!border-indigo-200 focus:!ring-4 focus:!ring-indigo-100/50 !transition-all font-semibold"
                [ngClass]="{
                  '!border-rose-300 !ring-rose-100':
                    branchForm.get('name')?.invalid && branchForm.get('name')?.touched,
                }"
              />
            </div>
            <div class="mt-2 px-1 flex justify-between">
              <p class="text-[10px] text-gray-400 font-medium">Nombre identificador público</p>
              <p
                *ngIf="branchForm.get('name')?.invalid && branchForm.get('name')?.touched"
                class="text-[10px] text-rose-500 font-bold uppercase transition-all animate-pulse"
              >
                El nombre debe tener al menos 3 letras
              </p>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Phone Field -->
            <div class="group">
              <label
                for="phone"
                class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 px-1"
              >
                Teléfono
              </label>
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-500 transition-colors"
                >
                  <i class="pi pi-phone"></i>
                </span>
                <input
                  pInputText
                  id="phone"
                  formControlName="phone"
                  placeholder="Ej: +502 1234 5678"
                  class="w-full !pl-12 !py-4 !rounded-2xl !bg-gray-50 !border-transparent focus:!bg-white focus:!border-indigo-200 focus:!ring-4 focus:!ring-indigo-100/50 !transition-all"
                  [ngClass]="{
                    '!border-rose-300 !ring-rose-100':
                      branchForm.get('phone')?.invalid && branchForm.get('phone')?.touched,
                  }"
                />
              </div>
            </div>

            <!-- Email Field -->
            <div class="group">
              <label
                for="email"
                class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 px-1"
              >
                Correo Electrónico
              </label>
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-500 transition-colors"
                >
                  <i class="pi pi-envelope"></i>
                </span>
                <input
                  pInputText
                  id="email"
                  formControlName="email"
                  placeholder="ejemplo@negocio.com"
                  class="w-full !pl-12 !py-4 !rounded-2xl !bg-gray-50 !border-transparent focus:!bg-white focus:!border-indigo-200 focus:!ring-4 focus:!ring-indigo-100/50 !transition-all"
                  [ngClass]="{
                    '!border-rose-300 !ring-rose-100':
                      branchForm.get('email')?.invalid && branchForm.get('email')?.touched,
                  }"
                />
              </div>
            </div>
          </div>

          <!-- Address Field -->
          <div class="group">
            <label
              for="address"
              class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 px-1"
            >
              Dirección Física
            </label>
            <textarea
              pTextarea
              id="address"
              formControlName="address"
              placeholder="Escribe la dirección exacta de la sucursal..."
              rows="3"
              class="w-full !p-4 !rounded-2xl !bg-gray-50 !border-transparent focus:!bg-white focus:!border-indigo-200 focus:!ring-4 focus:!ring-indigo-100/50 !transition-all resize-none"
              [ngClass]="{
                '!border-rose-300 !ring-rose-100':
                  branchForm.get('address')?.invalid && branchForm.get('address')?.touched,
              }"
            ></textarea>
            <p
              *ngIf="branchForm.get('address')?.invalid && branchForm.get('address')?.touched"
              class="mt-2 px-1 text-[10px] text-rose-500 font-bold uppercase"
            >
              La dirección es obligatoria
            </p>
          </div>

          <!-- Action Buttons -->
          <div class="flex items-center justify-end gap-4 pt-4">
            <button
              pButton
              type="button"
              label="Descartar"
              class="p-button-text !text-gray-400 hover:!text-gray-600 !rounded-2xl !px-6"
              (click)="onCancel()"
            ></button>
            <button
              pButton
              type="submit"
              [label]="isEdit ? 'Guardar Cambios' : 'Crear Sucursal'"
              [icon]="loading ? 'pi pi-spin pi-spinner' : 'pi pi-check'"
              [loading]="loading"
              [disabled]="branchForm.invalid"
              class="p-button-raised p-button-primary !rounded-2xl !px-8 !py-4 shadow-xl hover:shadow-indigo-200 transition-all font-bold tracking-tight"
            ></button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

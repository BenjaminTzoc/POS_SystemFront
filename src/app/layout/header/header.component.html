<header
  class="fixed inset-0 flex items-center justify-end w-full h-20 bg-white/80 transition-all duration-300 border-b border-gray-200 backdrop-blur-md z-10"
  [class.pl-26]="sidebarCollapsed"
  [class.pl-66]="!sidebarCollapsed"
>
  <div class="w-full h-full flex justify-end">
    <section class="py-2.5">
      <div
        (click)="goToCash()"
        class="flex items-center px-5 py-2.5 h-full rounded-xl cursor-pointer transition-all duration-500 hover:shadow-lg border group select-none mr-4 overflow-hidden"
        [ngClass]="
          currentCashSession()
            ? 'bg-emerald-50 hover:bg-emerald-100/30 border-emerald-300'
            : 'bg-rose-50 hover:bg-rose-100/30 border-rose-300'
        "
        pTooltip="Ver detalle de turno y caja"
        tooltipPosition="bottom"
      >
        <div class="flex items-center gap-3">
          <div class="relative flex items-center justify-center">
            <div
              class="w-3 h-3 rounded-full transition-all duration-500"
              [ngClass]="
                currentCashSession()
                  ? 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.4)] animate-pulse'
                  : 'bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.4)]'
              "
            ></div>
          </div>
          <div class="flex flex-col">
            <span
              class="text-[10px] font-bold text-gray-500 uppercase tracking-wide leading-none mb-1 group-hover:text-gray-600 transition-colors"
              >Estado de Caja</span
            >
            <span
              class="text-xs font-extrabold leading-none uppercase tracking-tight"
              [ngClass]="currentCashSession() ? 'text-emerald-600' : 'text-rose-600'"
            >
              {{ currentCashSession() ? 'Sesión Activa' : 'Turno Cerrado' }}
            </span>
          </div>
        </div>

        <!-- Info Expandible -->
        @if (currentCashSession()) {
          <div
            class="cash-expandable flex items-center ml-0 w-0 opacity-0 overflow-hidden transition-all duration-500 group-hover:ml-4 group-hover:w-48 group-hover:opacity-100"
          >
            <div class="h-8 w-px bg-emerald-200 mr-4"></div>
            <div class="flex flex-col min-w-max">
              <span
                class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest leading-none mb-1"
              >
                {{ currentCashSession()?.branchName }}
              </span>
              <span class="text-xs font-black text-emerald-700 leading-none">
                Inició con {{ currentCashSession()?.openingBalance | currency: 'Q' }}
              </span>
            </div>
          </div>
        }
      </div>
    </section>
  </div>
</header>

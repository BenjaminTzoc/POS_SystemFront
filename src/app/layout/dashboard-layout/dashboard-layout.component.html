<div class="fixed inset-0 flex overflow-visible bg-white">
  <!-- Sidebar Fijo -->
  <app-modern-sidebar 
    [collapsed]="isSidebarCollapsed" 
    (toggle)="onToggleSidebar($event)"
    class="flex-shrink-0 h-full" 
  />

  <!-- Área de Contenido -->
  <div class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
    <!-- Header Fijo en la parte superior del contenido -->
    <app-header 
      [sidebarCollapsed]="isSidebarCollapsed"
      class="flex-shrink-0 z-20">
    </app-header>

    <!-- Contenedor con Scroll Independiente -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden bg-slate-50/50 relative z-10">
      <div class="max-w-[1600px] mx-auto min-h-full">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>

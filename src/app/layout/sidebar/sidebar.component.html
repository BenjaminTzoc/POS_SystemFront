<aside
  class="fixed inset-0 h-screen border-r border-gray-200 bg-white transition-all duration-300 z-40 overflow-visible shadow-lg shadow-gray-200"
  [class.w-23]="sidebarCollapsed"
  [class.w-64]="!sidebarCollapsed"
>
  <div class="w-full px-6 transition-all duration-300 relative">
    <section class="w-full h-full py-5 flex items-center border-b border-gray-200 mb-6">
      <div class="flex gap-2">
        <div class="w-10 aspect-square rounded-full">
          <img src="avatars/Avatar.png" alt="Avatar del usuario" />
        </div>
        <article
          class="flex flex-col transition-all duration-300 overflow-hidden"
          [class.opacity-0]="sidebarCollapsed"
          [class.opacity-100]="!sidebarCollapsed"
          [class.w-0]="sidebarCollapsed"
          [class.w-auto]="!sidebarCollapsed"
        >
          <p class="text-xs font-normal text-gray-500 whitespace-nowrap uppercase">
            {{ currentUser()?.roles?.[0]?.name || 'Sin rol' }}
          </p>
          <h3 class="font-semibold text-gray-800 truncate max-w-[160px]">
            {{ currentUser()?.name }}
          </h3>
        </article>
      </div>
      <button
        (click)="onToggleSidebar()"
        class="absolute w-6 aspect-square flex justify-center items-center cursor-pointer -right-0 top-1/2 -translate-y-1/2 translate-x-1/2 border border-gray-300 rounded-sm bg-white"
      >
        <i
          class="pi pi-angle-left text-gray-800 transition-all duration-600"
          [class.rotate-180]="sidebarCollapsed"
        >
        </i>
      </button>
    </section>
  </div>
  <div class="w-full transition-all duration-300" [class]="!sidebarCollapsed ? 'px-6' : 'px-6'">
    <section class="text-gray-500 flex flex-col mb-3">
      <small
        class="font-medium text-xs mb-1.5 text-gray-500 transition-all duration-300"
        [class]="!sidebarCollapsed ? 'mx-3' : 'mx-1.5'"
      >
        RECURRENTES
      </small>
      <section class="flex flex-col gap-1">
        @for(item of recurrentItems(); track item.label) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-blue-50 text-blue-600"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center justify-between py-2.5 rounded-lg cursor-pointer hover:bg-gray-100 transition-all duration-300"
          [class]="!sidebarCollapsed ? 'px-3' : 'px-3'"
        >
          <div class="flex gap-3 items-center">
            <i [class]="item.icon" class="scale-105"></i>
            <span
              class="text-base/tight m-0"
              [class.opacity-0]="sidebarCollapsed"
              [class.opacity-100]="!sidebarCollapsed"
              [class.w-0]="sidebarCollapsed"
              [class.w-auto]="!sidebarCollapsed"
            >
              {{ item.label }}
            </span>
          </div>
        </a>
        }
      </section>
    </section>
